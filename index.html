<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FolloPay Wallet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
padding-bottom:120px;
}

/* HEADER */

.header{
background:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px #ddd;
}

.logo{
font-size:32px;
font-weight:bold;
color:#2563eb;
}

.logo span{
color:#f97316;
}

/* MAIN */

.main{
padding:20px;
}

.hidden{
display:none!important;
}

/* WALLET */

.wallet-card{
background:linear-gradient(135deg,#8b5cf6,#6d28d9);
padding:25px;
border-radius:28px;
color:white;
}

.wallet-card h1{
font-size:48px;
margin-top:10px;
}

.wallet-actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:25px;
}

.wallet-actions button{
background:rgba(255,255,255,.2);
color:white;
border:none;
padding:15px;
border-radius:18px;
font-weight:bold;
}

/* HOME */

.home-actions{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
margin-top:20px;
}

.action-card{
background:white;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 10px #ddd;
font-weight:bold;
cursor:pointer;
}

.action-card span{
font-size:35px;
display:block;
margin-bottom:8px;
}

/* TASK */

.task-card{
background:white;
padding:18px;
border-radius:22px;
margin-top:18px;
box-shadow:0 0 10px #ddd;
border-left:6px solid #7c3aed;
}

.reward{
background:#10b981;
color:white;
padding:8px 18px;
border-radius:20px;
display:inline-block;
margin-top:10px;
font-weight:bold;
}

.claim-btn{
background:#ede9fe;
color:#7c3aed;
border:none;
padding:12px 20px;
border-radius:20px;
font-weight:bold;
margin-top:10px;
}

.claim-box{
background:#eff6ff;
padding:15px;
border-radius:18px;
margin-top:15px;
}

.comment-box{
background:#111827;
color:white;
padding:15px;
border-radius:15px;
margin-top:10px;
line-height:1.6;
}

.copy-btn{
width:100%;
background:#2563eb;
color:white;
border:none;
padding:15px;
border-radius:15px;
margin-top:10px;
font-weight:bold;
}

.submit-btn{
width:100%;
background:#16a34a;
color:white;
border:none;
padding:15px;
border-radius:15px;
margin-top:10px;
font-weight:bold;
}

.upload-box{
background:#ecfdf5;
padding:15px;
border-radius:18px;
margin-top:15px;
border:2px dashed #4ade80;
text-align:center;
}

/* HISTORY */

.history-card{
background:white;
padding:18px;
border-radius:18px;
margin-top:15px;
box-shadow:0 0 10px #ddd;
}

/* REFER */

.refer-card{
background:linear-gradient(135deg,#8b5cf6,#6d28d9);
padding:30px;
border-radius:28px;
text-align:center;
color:white;
}

.refer-code{
background:rgba(255,255,255,.15);
padding:20px;
border-radius:18px;
font-size:36px;
font-weight:bold;
margin:20px 0;
}

/* PROFILE */

.profile-card{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 0 10px #ddd;
}

/* WITHDRAW */

.withdraw-page{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#eef6fb;
padding:20px;
overflow:auto;
display:none;
z-index:100;
}

.back-btn{
width:55px;
height:55px;
border:none;
border-radius:50%;
font-size:28px;
background:white;
}

.fund-box,
.withdraw-form{
background:white;
padding:25px;
border-radius:25px;
margin-top:25px;
}

.withdraw-form input,
.withdraw-form select{
width:100%;
padding:18px;
border-radius:15px;
border:1px solid #ddd;
margin:10px 0;
}

.request-btn{
width:100%;
background:#0ea5e9;
color:white;
border:none;
padding:18px;
border-radius:18px;
font-size:20px;
font-weight:bold;
}

/* NAV */

.bottom-nav{
position:fixed;
bottom:15px;
left:20px;
right:20px;
background:white;
padding:14px 0;
border-radius:30px;
display:flex;
justify-content:space-around;
box-shadow:0 0 15px #ccc;
}

.nav-item{
text-align:center;
font-size:14px;
cursor:pointer;
}

.active{
color:#2563eb;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
Follo<span>Pay</span>
</div>

<div>
🔔
</div>

</div>

<div class="main">

<!-- HOME -->

<div id="homeSection">

<div class="wallet-card">

<p>Available Balance</p>

<h1 id="balance">
₹0.00
</h1>

<div class="wallet-actions">

<button onclick="showRefer()">
👥 Invite Friends
</button>

<button>
💬 Get Help
</button>

</div>

</div>

<div class="home-actions">

<div class="action-card"
onclick="openWithdraw()">

<span>💸</span>

Withdraw

</div>

<div class="action-card">
<span>🎁</span>
Gift Card
</div>

<div class="action-card">
<span>📱</span>
Recharge
</div>

<div class="action-card">
<span>📺</span>
DTH
</div>

<div class="action-card">
<span>👥</span>
Pay Wallet
</div>

<div class="action-card">
<span>🤝</span>
Partner
</div>

</div>

</div>

<!-- EARN -->

<div id="earnSection"
class="hidden">

<h1>Earn Money</h1>

<div id="taskList"></div>

</div>

<!-- HISTORY -->

<div id="historySection"
class="hidden">

<h1>History</h1>

<div id="taskHistoryList"></div>

</div>

<!-- PROFILE -->

<div id="profileSection"
class="hidden">

<div class="profile-card">

<h1 id="profileName">
User
</h1>

<p id="profileEmail">
Email
</p>

<h2>
Wallet Balance:
₹<span id="profileBalance">0</span>
</h2>

<button class="submit-btn"
onclick="logout()">

Logout

</button>

</div>

</div>

<!-- REFER -->

<div id="referSection"
class="hidden">

<div class="refer-card">

<h1>
Earn ₹5 Per Friend
</h1>

<div class="refer-code">
KUK56KO
</div>

<button class="copy-btn"
onclick="copyRefer()">

Copy Code

</button>

</div>

</div>

</div>

<!-- WITHDRAW -->

<div id="withdrawPage"
class="withdraw-page">

<button class="back-btn"
onclick="closeWithdraw()">

←

</button>

<h1>Withdraw</h1>

<div class="fund-box">

<p>AVAILABLE FUNDS</p>

<h1 id="withdrawBalance">
₹0.00
</h1>

</div>

<div class="withdraw-form">

<select id="withdrawMethod">

<option value="UPI">
UPI Transfer
</option>

<option value="BANK">
Bank Transfer
</option>

</select>

<input type="text"
id="upiId"
placeholder="UPI ID">

<input type="number"
id="withdrawAmount"
placeholder="Amount">

<button class="request-btn"
onclick="submitWithdraw()">

REQUEST PAYOUT

</button>

</div>

</div>

<!-- NAV -->

<div class="bottom-nav">

<div class="nav-item active"
onclick="showHome()">
🏠<br>Home
</div>

<div class="nav-item"
onclick="showEarn()">
💰<br>Earn
</div>

<div class="nav-item"
onclick="showHistory()">
📜<br>History
</div>

<div class="nav-item"
onclick="showProfile()">
👤<br>Profile
</div>

<div class="nav-item"
onclick="showRefer()">
👥<br>Refer
</div>

</div>

<script>

if(localStorage.getItem("loggedIn") !== "yes"){
window.location.href = "login.html";
}

let balance =
Number(localStorage.getItem("balance")) || 0;

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

let submissions =
JSON.parse(localStorage.getItem("submissions")) || [];

let withdraws =
JSON.parse(localStorage.getItem("withdraws")) || [];

let user =
JSON.parse(localStorage.getItem("user"));

if(user){

document.getElementById("profileName")
.innerText = user.name;

document.getElementById("profileEmail")
.innerText = user.email;

}

function saveAll(){

localStorage.setItem(
"balance",
balance
);

localStorage.setItem(
"submissions",
JSON.stringify(submissions)
);

localStorage.setItem(
"withdraws",
JSON.stringify(withdraws)
);

}

function showBalance(){

document.getElementById("balance")
.innerText =
"₹" + balance.toFixed(2);

document.getElementById("profileBalance")
.innerText =
balance.toFixed(2);

}

function loadTasks(){

let html = "";

tasks.forEach((task,index)=>{

let alreadySubmitted =
submissions.some(sub =>
sub.app === task.app &&
(sub.status === "Pending" ||
sub.status === "Approved")
);

if(alreadySubmitted){
return;
}

let comment =
task.comments &&
task.comments.length > 0
? task.comments[0]
: "No comment";

html += `

<div class="task-card">

<h2>${task.app}</h2>

<p>
${task.title}
</p>

<div class="reward">
₹${task.reward}
</div>

<br>

<button class="claim-btn"
onclick="claimTask(${index})">

Claim →

</button>

<div class="claim-box hidden"
id="claimBox-${index}">

<h3>Assigned Comment</h3>

<div class="comment-box"
id="comment-${index}">

${comment}

</div>

<button class="copy-btn"
onclick="copyComment(${index})">

Copy Comment

</button>

<a href="${task.link}"
target="_blank">

<button class="submit-btn">

Open PlayStore

</button>

</a>

<div class="upload-box">

<input type="file"
id="shot-${index}"
accept="image/*">

<button class="submit-btn"
onclick="submitTask(${index})">

Submit Screenshot

</button>

</div>

</div>

</div>

`;

});

if(html === ""){
html = "<p>No new task available</p>";
}

document.getElementById("taskList")
.innerHTML = html;

}

function claimTask(index){

document.getElementById(
"claimBox-" + index
).classList.remove("hidden");

}

function copyComment(index){

let text =
document.getElementById(
"comment-" + index
).innerText;

navigator.clipboard.writeText(text);

alert("Comment Copied");

}

function submitTask(index){

let file =
document.getElementById(
"shot-" + index
).files[0];

if(!file){

alert("Upload screenshot");

return;

}

let reader = new FileReader();

reader.onload = function(){

submissions.push({

app:tasks[index].app,
title:tasks[index].title,
reward:tasks[index].reward,
comment:document.getElementById(
"comment-" + index
).innerText,
proof:reader.result,
status:"Pending",
time:new Date().toLocaleString()

});

saveAll();

alert(
"Task Submitted"
);

loadTasks();

loadHistory();

};

reader.readAsDataURL(file);

}

function loadHistory(){

let html = "";

if(submissions.length === 0){

html = "<p>No history</p>";

}

submissions.forEach(sub=>{

html += `

<div class="history-card">

<h3>${sub.app}</h3>

<p>${sub.title}</p>

<p>
Reward: ₹${sub.reward}
</p>

<p>
Status:
<b>${sub.status}</b>
</p>

</div>

`;

});

document.getElementById(
"taskHistoryList"
).innerHTML = html;

}

function openWithdraw(){

document.getElementById(
"withdrawPage"
).style.display = "block";

document.getElementById(
"withdrawBalance"
).innerText =
"₹" + balance.toFixed(2);

}

function closeWithdraw(){

document.getElementById(
"withdrawPage"
).style.display = "none";

}

function submitWithdraw(){

let amount =
Number(document.getElementById(
"withdrawAmount"
).value);

if(amount < 10){

alert("Minimum withdraw ₹10");

return;

}

if(amount > balance){

alert("Insufficient Balance");

return;

}

let charge =
amount < 500
? amount * 0.02
: 0;

let finalAmount =
amount - charge;

withdraws.push({

method:
document.getElementById(
"withdrawMethod"
).value,

amount:amount,

charge:charge,

final:finalAmount,

status:"Pending"

});

balance -= amount;

saveAll();

showBalance();

alert(
"Withdraw Request Submitted"
);

closeWithdraw();

}

function copyRefer(){

navigator.clipboard.writeText(
"KUK56KO"
);

alert(
"Referral Code Copied"
);

}

function hideAll(){

homeSection.classList.add("hidden");
earnSection.classList.add("hidden");
historySection.classList.add("hidden");
profileSection.classList.add("hidden");
referSection.classList.add("hidden");

}

function setActive(i){

document.querySelectorAll(".nav-item")
.forEach(x=>x.classList.remove("active"));

document.querySelectorAll(".nav-item")[i]
.classList.add("active");

}

function showHome(){

hideAll();

homeSection.classList.remove("hidden");

setActive(0);

}

function showEarn(){

hideAll();

earnSection.classList.remove("hidden");

setActive(1);

}

function showHistory(){

hideAll();

historySection.classList.remove("hidden");

setActive(2);

}

function showProfile(){

hideAll();

profileSection.classList.remove("hidden");

setActive(3);

}

function showRefer(){

hideAll();

referSection.classList.remove("hidden");

setActive(4);

}

function logout(){

localStorage.removeItem(
"loggedIn"
);

window.location.href =
"login.html";

}

showBalance();

loadTasks();

loadHistory();

</script>

</body>
</html>
