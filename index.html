<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
background-image:
radial-gradient(circle at top left,#312e81 0%,transparent 35%),
radial-gradient(circle at bottom right,#0ea5e9 0%,transparent 30%);
min-height:100vh;
color:white;
padding-bottom:120px;
overflow-x:hidden;
}

.hidden{
display:none!important;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 22px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:30px;
font-weight:700;
letter-spacing:1px;
color:white;
}

.logo span{
color:#38bdf8;
}

.header-right{
width:48px;
height:48px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.1);
font-size:22px;
cursor:pointer;
}

/* MAIN */

.main{
padding:20px;
}

/* WALLET CARD */

.wallet-card{
position:relative;
overflow:hidden;
padding:28px;
border-radius:30px;
background:
linear-gradient(135deg,#2563eb,#7c3aed);
box-shadow:
0 10px 40px rgba(0,0,0,0.4),
inset 0 0 40px rgba(255,255,255,0.08);
}

.wallet-card::before{
content:"";
position:absolute;
top:-60px;
right:-60px;
width:180px;
height:180px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

.wallet-card p{
opacity:.8;
font-size:15px;
}

.wallet-card h1{
font-size:48px;
margin-top:8px;
font-weight:700;
}

.wallet-actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:28px;
}

.wallet-actions button{
border:none;
padding:16px;
border-radius:18px;
font-size:15px;
font-weight:600;
color:white;
cursor:pointer;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
transition:.3s;
}

.wallet-actions button:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.18);
}

/* HOME ACTIONS */

.home-actions{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
margin-top:22px;
}

.action-card{
padding:20px 10px;
border-radius:24px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
transition:.3s;
}

.action-card:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.12);
}

.action-card span{
display:block;
font-size:34px;
margin-bottom:10px;
}

/* TABS */

.tabs{
display:flex;
gap:12px;
overflow-x:auto;
margin:22px 0;
padding-bottom:5px;
}

.tabs::-webkit-scrollbar{
display:none;
}

.tab{
border:none;
padding:14px 22px;
border-radius:18px;
font-weight:600;
font-size:15px;
cursor:pointer;
color:white;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.tab.active{
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
}

/* TASK CARD */

.task-card{
display:flex;
align-items:center;
gap:16px;
padding:18px;
margin-top:18px;
border-radius:28px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
}

.app-icon{
width:75px;
height:75px;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
background:rgba(255,255,255,0.1);
}

.task-info{
flex:1;
}

.task-info h2{
font-size:20px;
font-weight:600;
}

.task-info p{
font-size:13px;
margin-top:4px;
color:#cbd5e1;
}

.reward{
display:inline-block;
margin-top:10px;
padding:8px 16px;
border-radius:30px;
background:#10b981;
font-size:14px;
font-weight:600;
}

.claim-btn{
border:none;
padding:14px 20px;
border-radius:18px;
font-weight:600;
cursor:pointer;
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
color:white;
}

/* CLAIM BOX */

.claim-box{
margin-top:15px;
padding:20px;
border-radius:24px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
}

.comment-box{
padding:16px;
border-radius:18px;
background:#111827;
line-height:1.7;
margin-top:12px;
font-size:14px;
}

.copy-btn,
.submit-btn{
width:100%;
border:none;
padding:16px;
border-radius:18px;
margin-top:12px;
font-weight:600;
cursor:pointer;
font-size:15px;
}

.copy-btn{
background:#2563eb;
color:white;
}

.submit-btn{
background:#10b981;
color:white;
}

.upload-box{
margin-top:16px;
padding:18px;
border-radius:20px;
border:2px dashed rgba(255,255,255,0.2);
text-align:center;
}

/* PROFILE */

.profile-card{
padding:30px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
text-align:center;
}

.profile-card h1{
font-size:30px;
margin-bottom:10px;
}

.profile-card p{
color:#cbd5e1;
margin-bottom:15px;
}

/* REFER */

.refer-card{
padding:35px 25px;
border-radius:30px;
text-align:center;
background:linear-gradient(135deg,#2563eb,#8b5cf6);
}

.refer-code{
margin:24px 0;
padding:22px;
font-size:38px;
font-weight:700;
border-radius:20px;
background:rgba(255,255,255,0.15);
letter-spacing:2px;
}

/* WITHDRAW */

.withdraw-page{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
overflow:auto;
z-index:200;
padding:22px;
display:none;
background:#0f172a;
}

.back-btn{
width:56px;
height:56px;
border:none;
border-radius:50%;
font-size:24px;
cursor:pointer;
background:rgba(255,255,255,0.1);
color:white;
}

.fund-box,
.withdraw-form{
padding:25px;
margin-top:22px;
border-radius:28px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
}

.withdraw-form input,
.withdraw-form select{
width:100%;
padding:18px;
margin-top:14px;
border:none;
outline:none;
border-radius:18px;
font-size:15px;
background:rgba(255,255,255,0.08);
color:white;
}

.withdraw-form input::placeholder{
color:#cbd5e1;
}

.request-btn{
width:100%;
border:none;
padding:18px;
border-radius:20px;
margin-top:18px;
font-size:17px;
font-weight:700;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#06b6d4,#2563eb);
}

/* HISTORY */

.history-card{
display:flex;
align-items:center;
gap:15px;
padding:18px;
margin-top:18px;
border-radius:26px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
}

.history-info{
flex:1;
}

.history-info h3{
font-size:18px;
}

.history-info p{
margin-top:5px;
color:#cbd5e1;
}

.amount{
font-size:22px;
font-weight:700;
}

.status{
display:inline-block;
margin-top:10px;
padding:8px 15px;
border-radius:20px;
font-size:13px;
font-weight:600;
}

.Pending{
background:#f59e0b;
color:white;
}

.Approved,
.Paid{
background:#10b981;
color:white;
}

.Rejected{
background:#ef4444;
color:white;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:15px;
left:15px;
right:15px;
padding:14px 10px;
display:flex;
justify-content:space-around;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
}

.nav-item{
font-size:13px;
text-align:center;
cursor:pointer;
color:#cbd5e1;
transition:.3s;
}

.nav-item.active{
color:white;
font-weight:700;
transform:translateY(-3px);
}

/* MOBILE */

@media(max-width:600px){

.wallet-card h1{
font-size:40px;
}

.home-actions{
grid-template-columns:repeat(2,1fr);
}

.task-card{
flex-direction:column;
align-items:flex-start;
}

.claim-btn{
width:100%;
margin-top:10px;
}

}
</style>
