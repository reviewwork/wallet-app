<script>

if(localStorage.getItem("loggedIn") !== "yes"){
window.location.replace("login.html");
}

let balanceAmount =
Number(localStorage.getItem("balance")) || 0;

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

let submissions =
JSON.parse(localStorage.getItem("submissions")) || [];

let withdraws =
JSON.parse(localStorage.getItem("withdraws")) || [];

let user =
JSON.parse(localStorage.getItem("user")) || {};

let currentEarnFilter = "All";

let currentHistoryFilter = "All";

function saveAll(){

localStorage.setItem(
"balance",
balanceAmount
);

localStorage.setItem(
"submissions",
JSON.stringify(submissions)
);

localStorage.setItem(
"withdraws",
JSON.stringify(withdraws)
);

}

/* BALANCE */

function showBalance(){

balance.innerText =
"₹" +
balanceAmount.toFixed(2);

profileBalance.innerText =
balanceAmount.toFixed(2);

withdrawBalance.innerText =
"₹" +
balanceAmount.toFixed(2);

}

/* PROFILE */

function loadProfile(){

profileName.innerText =
user.name || "User";

profileEmail.innerText =
user.email || "Email";

myReferCode.innerText =
user.phone || "CODE";

}

/* TAB */

function setTabActive(button){

button.parentElement
.querySelectorAll(".tab")
.forEach(b=>
b.classList.remove("active")
);

button.classList.add("active");

}

function filterEarn(status){

currentEarnFilter = status;

setTabActive(event.target);

loadTasks();

}

function filterHistory(status){

currentHistoryFilter = status;

setTabActive(event.target);

loadHistory();

}

/* TASK LOAD */

function loadTasks(){

let html = "";

tasks.forEach((task,index)=>{

let sub =
submissions.find(
s => s.app === task.app
);

/* FILTER */

if(currentEarnFilter === "All"){

if(sub) return;

}

if(currentEarnFilter === "Pending"){

if(!sub || sub.status !== "Pending")
return;

}

if(currentEarnFilter === "Approved"){

if(!sub || sub.status !== "Approved")
return;

}

if(currentEarnFilter === "Rejected"){

if(!sub || sub.status !== "Rejected")
return;

}

/* COMMENT */

let comment =
task.comments &&
task.comments.length > 0
?
task.comments[0]
:
"No comment";

/* BUTTON */

let btnText = "Claim →";

let btnClick =
`onclick="claimTask(${index})"`;

if(sub && sub.status === "Pending"){

btnText = "Pending";

btnClick = "";

}

if(sub && sub.status === "Approved"){

btnText = "Approved";

btnClick = "";

}

if(sub && sub.status === "Rejected"){

btnText = "Rejected";

btnClick = "";

}

/* CARD */

html += `

<div class="task-card">

<div class="app-icon">
📱
</div>

<div class="task-info">

<h2>
${task.app}
</h2>

<p>
${task.title}
</p>

<div class="reward">
₹${task.reward}.00
</div>

</div>

<button class="claim-btn"
${btnClick}>

${btnText}

</button>

</div>

`;

/* CLAIM POPUP */

if(!sub){

html += `

<div class="claim-box hidden"
id="claimBox-${index}">

<h3>
Assigned Comment
</h3>

<div class="comment-box"
id="comment-${index}">

${comment}

</div>

<button class="copy-btn"
onclick="copyComment(${index})">

Copy Comment

</button>

<a href="${task.link}"
target="_blank">

<button class="submit-btn">

Open Task Link

</button>

</a>

<div class="upload-box">

<h3>
Upload Screenshot
</h3>

<input type="file"
id="shot-${index}"
accept="image/*">

<button class="submit-btn"
onclick="submitTask(${index})">

Submit Screenshot

</button>

</div>

</div>

`;

}

});

if(html === ""){

html =
"<p>No task available</p>";

}

taskList.innerHTML = html;

}

/* CLAIM */

function claimTask(index){

document.getElementById(
"claimBox-" + index
).classList.remove("hidden");

}

/* COPY */

function copyComment(index){

let text =
document.getElementById(
"comment-" + index
).innerText;

navigator.clipboard.writeText(text);

alert("Comment copied");

}

/* SUBMIT TASK */

async function submitTask(index){

alert("Uploading screenshot...");

let originalFile =
document.getElementById(
"shot-" + index
).files[0];

if(!originalFile){

alert("Select screenshot");

return;

}

/* COMPRESS */

let canvas =
document.createElement("canvas");

let ctx =
canvas.getContext("2d");

let img =
new Image();

img.src =
URL.createObjectURL(originalFile);

await new Promise(resolve => {
img.onload = resolve;
});

canvas.width = 700;

canvas.height =
(img.height / img.width) * 700;

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

let compressedBlob =
await new Promise(resolve =>
canvas.toBlob(
resolve,
"image/jpeg",
0.6
)
);

let file =
new File(
[compressedBlob],
"proof.jpg",
{
type:"image/jpeg"
}
);

/* CLOUDINARY */

let formData =
new FormData();

formData.append(
"file",
file
);

formData.append(
"upload_preset",
"walletapp"
);

let response =
await fetch(
"https://api.cloudinary.com/v1_1/diewwfd5t/image/upload",
{
method:"POST",
body:formData
}
);

let data =
await response.json();

if(!data.secure_url){

alert("Upload failed");

return;

}

/* SAVE */

submissions.push({

userPhone:
user.phone || "",

userName:
user.name || "",

userEmail:
user.email || "",

app:
tasks[index].app,

title:
tasks[index].title,

reward:
Number(tasks[index].reward),

comment:
document.getElementById(
"comment-" + index
).innerText,

proof:
data.secure_url,

status:
"Pending",

time:
new Date().toLocaleDateString()

});

saveAll();

alert(
"Task submitted"
);

loadTasks();

loadHistory();

}

/* HISTORY */

function loadHistory(){

let html = "";

submissions.forEach(sub=>{

if(
currentHistoryFilter !== "All"
&&
sub.status !== currentHistoryFilter
) return;

let cls =
sub.status === "Pending"
?
"pending"
:
sub.status === "Rejected"
?
"rejected"
:
"";

html += `

<div class="history-card ${cls}">

<div class="app-icon">
📱
</div>

<div class="history-info">

<h3>
${sub.app}
</h3>

<p>
📅 ${sub.time || ""}
</p>

<span class="status ${sub.status}">
${sub.status}
</span>

</div>

<div>

<div class="amount">
₹${sub.reward}.00
</div>

</div>

</div>

`;

});

if(html === ""){

html =
"<p>No history</p>";

}

taskHistoryList.innerHTML =
html;

}

/* WITHDRAW */

function openWithdraw(){

withdrawPage.style.display =
"block";

showBalance();

}

function closeWithdraw(){

withdrawPage.style.display =
"none";

}

function changeWithdrawMethod(){

if(withdrawMethod.value === "UPI"){

upiBox.classList.remove("hidden");

bankBox.classList.add("hidden");

}
else{

upiBox.classList.add("hidden");

bankBox.classList.remove("hidden");

}

}

function checkCharge(){

let amount =
Number(withdrawAmount.value);

chargeText.innerText =

amount >= 10 && amount < 500

?

"2% Charge: ₹" +
(amount * 0.02).toFixed(2)

:

amount >= 500

?

"0% Charge"

:

"";

}

function submitWithdraw(){

let amount =
Number(withdrawAmount.value);

let method =
withdrawMethod.value;

if(amount < 10){

alert("Minimum withdraw ₹10");

return;

}

if(amount > balanceAmount){

alert("Insufficient balance");

return;

}

let details = "";

if(method === "UPI"){

if(upiId.value.trim() === ""){

alert("Enter UPI ID");

return;

}

details =
"UPI ID: " +
upiId.value.trim();

}
else{

if(
accountNumber.value.trim()===""
||
ifscCode.value.trim()===""
||
bankName.value.trim()===""
){

alert("Fill bank details");

return;

}

details =

"Account: " +
accountNumber.value +

" | IFSC: " +
ifscCode.value +

" | Bank: " +
bankName.value;

}

let charge =
amount < 500
?
amount * 0.02
:
0;

let finalAmount =
amount - charge;

withdraws.push({

id:
Date.now(),

userName:
user.name || "User",

userPhone:
user.phone || "N/A",

userEmail:
user.email || "N/A",

method,

amount,

charge:
charge.toFixed(2),

final:
finalAmount.toFixed(2),

details,

status:
"Pending",

time:
new Date().toLocaleDateString()

});

balanceAmount -= amount;

saveAll();

showBalance();

alert(
"Withdraw request submitted"
);

closeWithdraw();

}

/* REFER */

function copyRefer(){

navigator.clipboard.writeText(
user.phone || "CODE"
);

alert(
"Referral code copied"
);

}

/* SECTION */

function hideAll(){

homeSection.classList.add("hidden");

earnSection.classList.add("hidden");

historySection.classList.add("hidden");

profileSection.classList.add("hidden");

referSection.classList.add("hidden");

}

function setActive(i){

document.querySelectorAll(".nav-item")
.forEach(x=>
x.classList.remove("active")
);

document.querySelectorAll(".nav-item")[i]
.classList.add("active");

}

function showHome(){

hideAll();

homeSection.classList.remove("hidden");

setActive(0);

}

function showEarn(){

hideAll();

earnSection.classList.remove("hidden");

loadTasks();

setActive(1);

}

function showHistory(){

hideAll();

historySection.classList.remove("hidden");

loadHistory();

setActive(2);

}

function showProfile(){

hideAll();

profileSection.classList.remove("hidden");

setActive(3);

}

function showRefer(){

hideAll();

referSection.classList.remove("hidden");

setActive(4);

}

/* LOGOUT */

function logout(){

localStorage.removeItem(
"loggedIn"
);

window.location.replace(
"login.html"
);

}

/* START */

showBalance();

loadProfile();

loadTasks();

loadHistory();

</script>
