<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FolloPay Login</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#6d4df5;min-height:100vh}
.top{padding:40px 30px;color:white;text-align:center}
.top h1{margin-top:20px;font-size:45px}
.top p{margin-top:10px;font-size:18px}
.form-box{background:#f8f8fb;border-radius:45px 45px 0 0;padding:35px 30px;min-height:70vh;margin-top:40px}
.input-box{margin-bottom:20px}
.input-box label{display:block;margin-bottom:10px;font-size:20px;font-weight:bold}
.input-box input{width:100%;padding:18px;border:none;border-radius:18px;background:white;font-size:17px}
.btn{width:100%;padding:18px;border:none;border-radius:18px;background:#5b47ea;color:white;font-size:22px;font-weight:bold;margin-top:10px}
.green{background:#16a34a}
.switch{text-align:center;margin-top:25px;font-size:18px}
.switch span{color:#5b47ea;font-weight:bold;cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>

<div id="loginPage">
<div class="top">
<h1>Welcome Back</h1>
<p>Sign in to continue earning rewards</p>
</div>

<div class="form-box">
<div class="input-box">
<label>Phone Number</label>
<input type="text" id="loginPhone" placeholder="Enter phone number">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="loginPassword" placeholder="Enter password">
</div>

<button class="btn" onclick="login()">Sign In →</button>

<div class="switch">
New here? <span onclick="showSignup()">Create Account</span>
</div>
</div>
</div>

<div id="signupPage" class="hidden">
<div class="top">
<h1>Create Account</h1>
<p>Email OTP verification required</p>
</div>

<div class="form-box">

<div class="input-box">
<label>Full Name</label>
<input type="text" id="signupName" placeholder="Enter name">
</div>

<div class="input-box">
<label>Email</label>
<input type="email" id="signupEmail" placeholder="Enter email">
</div>

<div class="input-box">
<label>Phone Number</label>
<input type="text" id="signupPhone" placeholder="Enter phone number">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="signupPassword" placeholder="Create password">
</div>

<div class="input-box">
<label>Referral Code</label>
<input type="text" id="referCode" placeholder="Optional">
</div>

<button class="btn green" onclick="sendOTP()">Send Email OTP</button>

<div class="input-box">
<label>Enter OTP</label>
<input type="text" id="otpInput" placeholder="Enter OTP from email">
</div>

<button class="btn" onclick="verifyAndSignup()">Verify OTP & Sign Up</button>

<div class="switch">
Already have account? <span onclick="showLogin()">Login</span>
</div>

</div>
</div>

<script>
emailjs.init("YGfloB0lCixT1-cnZ");

let generatedOTP = "";

function showSignup(){
  loginPage.classList.add("hidden");
  signupPage.classList.remove("hidden");
}

function showLogin(){
  signupPage.classList.add("hidden");
  loginPage.classList.remove("hidden");
}

function sendOTP(){
  let name = signupName.value.trim();
  let email = signupEmail.value.trim();
  let phone = signupPhone.value.trim();
  let password = signupPassword.value.trim();

  if(name === "" || email === "" || phone === "" || password === ""){
    alert("All details fill karo");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];
  let phoneExists = users.some(u => u.phone === phone);
  let emailExists = users.some(u => u.email === email);

  if(phoneExists){
    alert("This mobile number already registered");
    return;
  }

  if(emailExists){
    alert("This email already registered");
    return;
  }

  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

  emailjs.send("service_hk167nx", "__ejs-test-mail-service__", {
    to_email: email,
    otp_code: generatedOTP,
    name: name
  }).then(function(){
    alert("OTP sent to your email");
  }).catch(function(error){
    alert("OTP send failed. EmailJS template/settings check karo.");
    console.log(error);
  });
}

function verifyAndSignup(){
  let enteredOTP = otpInput.value.trim();

  if(generatedOTP === ""){
    alert("Pehle OTP send karo");
    return;
  }

  if(enteredOTP !== generatedOTP){
    alert("Wrong OTP");
    return;
  }

  let user = {
    name: signupName.value.trim(),
    email: signupEmail.value.trim(),
    phone: signupPhone.value.trim(),
    password: signupPassword.value.trim(),
    referCode: referCode.value.trim(),
    joined: new Date().toLocaleString()
  };

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({
    name: user.name,
    email: user.email,
    phone: user.phone,
    referCode: user.referCode,
    joined: user.joined
  });

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("user", JSON.stringify(user));
  localStorage.setItem("loggedIn", "yes");

  alert("Signup successful");
  window.location.replace("index.html");
}

function login(){
  let phone = loginPhone.value.trim();
  let password = loginPassword.value.trim();

  if(phone === "8119959070" && password === "Jutondas"){
    localStorage.setItem("adminLoggedIn", "yes");
    window.location.replace("admin.html");
    return;
  }

  let saved = JSON.parse(localStorage.getItem("user"));

  if(!saved){
    alert("Create account first");
    return;
  }

  if(phone === saved.phone && password === saved.password){
    localStorage.setItem("loggedIn", "yes");
    window.location.replace("index.html");
  }else{
    alert("Wrong phone or password");
  }
}
</script>

</body>
</html>
