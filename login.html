<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FolloPay Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#6d4df5;
min-height:100vh;
}

.top{
padding:40px 30px;
color:white;
text-align:center;
}

.top img{
width:90px;
height:90px;
border-radius:25px;
background:rgba(255,255,255,0.15);
padding:12px;
}

.top h1{
margin-top:25px;
font-size:48px;
font-weight:bold;
}

.top p{
margin-top:10px;
font-size:18px;
opacity:.9;
}

.form-box{
background:#f8f8fb;
border-radius:45px 45px 0 0;
padding:35px 30px;
min-height:70vh;
margin-top:40px;
}

.input-box{
margin-bottom:22px;
}

.input-box label{
display:block;
margin-bottom:10px;
font-size:20px;
font-weight:bold;
color:#111827;
}

.input-box input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
font-size:17px;
box-shadow:0 0 10px #eee;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#5b47ea;
color:white;
font-size:22px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.switch{
text-align:center;
margin-top:25px;
font-size:18px;
}

.switch span{
color:#5b47ea;
font-weight:bold;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="top">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h1>Welcome Back</h1>

<p>Sign in to continue earning rewards</p>

</div>

<div class="form-box">

<div class="input-box">
<label>Phone Number</label>
<input type="text" id="loginPhone" placeholder="Enter phone number">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="loginPassword" placeholder="Enter your password">
</div>

<button class="btn" onclick="login()">Sign In →</button>

<div class="switch">
New here?
<span onclick="showSignup()">Create Account</span>
</div>

</div>

</div>

<!-- SIGNUP PAGE -->

<div id="signupPage" class="hidden">

<div class="top">

<img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">

<h1>Create Account</h1>

<p>Create your wallet account</p>

</div>

<div class="form-box">

<div class="input-box">
<label>Full Name</label>
<input type="text" id="signupName" placeholder="Enter your name">
</div>

<div class="input-box">
<label>Email</label>
<input type="email" id="signupEmail" placeholder="Enter email">
</div>

<div class="input-box">
<label>Phone Number</label>
<input type="text" id="signupPhone" placeholder="Enter phone number">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="signupPassword" placeholder="Create password">
</div>

<div class="input-box">
<label>Referral Code</label>
<input type="text" id="referCode" placeholder="Optional">
</div>

<button class="btn" onclick="signup()">Continue →</button>

<div class="switch">
Already have account?
<span onclick="showLogin()">Login</span>
</div>

</div>

</div>

<script>

function showSignup(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("signupPage").classList.remove("hidden");
}

function showLogin(){
document.getElementById("signupPage").classList.add("hidden");
document.getElementById("loginPage").classList.remove("hidden");
}

function signup(){

let user = {
name: document.getElementById("signupName").value,
email: document.getElementById("signupEmail").value,
phone: document.getElementById("signupPhone").value,
password: document.getElementById("signupPassword").value,
referCode: document.getElementById("referCode").value,
joined: new Date().toLocaleString()
};

if(
user.name === "" ||
user.email === "" ||
user.phone === "" ||
user.password === ""
){
alert("All details required");
return;
}

/* CURRENT USER SAVE */
localStorage.setItem("user", JSON.stringify(user));

/* ALL USERS SAVE FOR ADMIN PANEL */
let users = JSON.parse(localStorage.getItem("users")) || [];

let alreadyExists = users.some(u => u.phone === user.phone);

if(alreadyExists){
alert("This phone number already registered");
return;
}

users.push({
name: user.name,
email: user.email,
phone: user.phone,
referCode: user.referCode,
joined: user.joined
});

localStorage.setItem("users", JSON.stringify(users));

/* LOGIN SET */
localStorage.setItem("loggedIn", "yes");

alert("Account Created Successfully");

window.location.replace("index.html");

}

function login(){

let phone = document.getElementById("loginPhone").value;
let password = document.getElementById("loginPassword").value;

/* FIXED ADMIN LOGIN */

if(
phone === "8119959070" &&
password === "Jutondas"
){

localStorage.setItem("adminLoggedIn", "yes");

alert("Admin Login Successful");

window.location.href = "admin.html";

return;

}

/* USER LOGIN */

let users = JSON.parse(localStorage.getItem("users")) || [];

let matchedUser = users.find(u => u.phone === phone);

let saved = JSON.parse(localStorage.getItem("user"));

if(saved && saved.phone === phone && saved.password === password){

localStorage.setItem("loggedIn", "yes");

window.location.replace("index.html");

return;

}

if(!matchedUser){
alert("Create account first");
return;
}

alert("Wrong phone or password");

}

</script>

</body>

</html>
