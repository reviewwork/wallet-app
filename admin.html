<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f3f4f6;padding:20px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logout-btn{background:#dc2626;color:white;border:none;padding:12px 18px;border-radius:12px}
.box{background:white;padding:20px;border-radius:20px;margin-bottom:20px;box-shadow:0 0 10px #ddd}
input,textarea{width:100%;padding:14px;margin-top:12px;border-radius:12px;border:1px solid #ddd;font-size:16px}
textarea{height:170px}
button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:12px;background:#7c3aed;color:white;font-size:16px;font-weight:bold}
.card{background:#f9fafb;padding:16px;border-radius:18px;margin-top:14px;border-left:6px solid #7c3aed}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
.stat{background:#eef2ff;padding:15px;border-radius:15px;text-align:center;font-weight:bold}
.folder{background:#fff7ed;border-left:6px solid #f97316;padding:18px;border-radius:18px;margin-top:18px}
.screenshot{width:100%;border-radius:15px;margin-top:12px;border:1px solid #ddd}
.approve{background:#16a34a}
.reject{background:#dc2626}
.delete{background:#ef4444}
.badge{display:inline-block;padding:7px 12px;border-radius:20px;font-weight:bold;margin-top:8px}
.pending{background:#fef3c7;color:#92400e}
.approved{background:#dcfce7;color:#166534}
.rejected{background:#fee2e2;color:#991b1b}
</style>
</head>

<body>

<div class="top">
  <h1>Admin Panel</h1>
  <button class="logout-btn" onclick="adminLogout()">Logout</button>
</div>

<div class="box">
  <h2>Add New Task</h2>

  <input id="app" placeholder="App Name">
  <input id="title" placeholder="Task Title">
  <input id="reward" type="number" placeholder="Reward Amount">
  <input id="link" placeholder="Play Store / Task Link">

  <textarea id="comments" placeholder="Bulk comments paste karo&#10;1 line = 1 comment"></textarea>

  <button onclick="addTask()">Add Task</button>
</div>

<div class="box">
  <h2>All Tasks + Comment Usage</h2>
  <div id="taskList"></div>
</div>

<div class="box">
  <h2>App-wise Screenshot Folders</h2>
  <div id="folderList"></div>
</div>

<div class="box">
  <h2>Withdraw Requests</h2>
  <div id="withdrawList"></div>
</div>

<script>
if(localStorage.getItem("adminLoggedIn") !== "yes"){
  window.location.href = "login.html";
}

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let submissions = JSON.parse(localStorage.getItem("submissions")) || [];
let withdraws = JSON.parse(localStorage.getItem("withdraws")) || [];

function saveData(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
  localStorage.setItem("submissions", JSON.stringify(submissions));
  localStorage.setItem("withdraws", JSON.stringify(withdraws));
}

function addTask(){
  let task = {
    app: app.value.trim(),
    title: title.value.trim(),
    reward: Number(reward.value),
    link: link.value.trim(),
    comments: comments.value.split("\n").map(x=>x.trim()).filter(x=>x !== "")
  };

  if(!task.app || !task.title || !task.reward || !task.link){
    alert("All fields required");
    return;
  }

  tasks.push(task);
  saveData();
  alert("Task Added");
  location.reload();
}

function usedCommentCount(app){
  return submissions.filter(s=>s.app === app).length;
}

function loadTasks(){
  let html = "";

  if(tasks.length === 0){
    html = "<p>No task available</p>";
  }

  tasks.forEach((task,index)=>{
    let total = task.comments ? task.comments.length : 0;
    let used = usedCommentCount(task.app);
    let left = total - used;

    html += `
      <div class="card">
        <h3>${task.app}</h3>
        <p>${task.title}</p>
        <b>Reward: ₹${task.reward}</b>

        <div class="stat-grid">
          <div class="stat">Total<br>${total}</div>
          <div class="stat">Used<br>${used}</div>
          <div class="stat">Left<br>${left < 0 ? 0 : left}</div>
        </div>

        <button class="delete" onclick="deleteTask(${index})">Delete Task</button>
      </div>
    `;
  });

  taskList.innerHTML = html;
}

function deleteTask(index){
  if(confirm("Delete this task?")){
    tasks.splice(index,1);
    saveData();
    location.reload();
  }
}

function getStatusClass(status){
  if(status === "Approved") return "approved";
  if(status === "Rejected") return "rejected";
  return "pending";
}

function loadFolders(){
  let apps = [...new Set(submissions.map(s=>s.app))];
  let html = "";

  if(apps.length === 0){
    html = "<p>No screenshots submitted yet</p>";
  }

  apps.forEach(appName=>{
    let appSubs = submissions.filter(s=>s.app === appName);
    let pending = appSubs.filter(s=>s.status === "Pending").length;
    let approved = appSubs.filter(s=>s.status === "Approved").length;
    let rejected = appSubs.filter(s=>s.status === "Rejected").length;

    html += `
      <div class="folder">
        <h2>📁 ${appName}</h2>

        <div class="stat-grid">
          <div class="stat">Pending<br>${pending}</div>
          <div class="stat">Approved<br>${approved}</div>
          <div class="stat">Rejected<br>${rejected}</div>
        </div>
    `;

    appSubs.forEach((sub)=>{
      let realIndex = submissions.indexOf(sub);

      html += `
        <div class="card">
          <h3>${sub.title}</h3>
          <span class="badge ${getStatusClass(sub.status)}">${sub.status}</span>

          <p><b>Reward:</b> ₹${sub.reward}</p>
          <p><b>Time:</b> ${sub.time || "N/A"}</p>

          <p><b>Used Comment:</b></p>
          <div style="background:#111827;color:white;padding:12px;border-radius:12px;">
            ${sub.comment || ""}
          </div>

          <img class="screenshot" src="${sub.proof}">

          <button class="approve" onclick="approveTask(${realIndex})">Approve</button>
          <button class="reject" onclick="rejectTask(${realIndex})">Reject</button>
        </div>
      `;
    });

    html += `</div>`;
  });

  folderList.innerHTML = html;
}

function approveTask(index){
  submissions[index].status = "Approved";
  saveData();
  alert("Approved");
  location.reload();
}

function rejectTask(index){
  submissions[index].status = "Rejected";
  saveData();
  alert("Rejected");
  location.reload();
}

function loadWithdraws(){
  let html = "";

  if(withdraws.length === 0){
    html = "<p>No withdraw request</p>";
  }

  withdraws.forEach((w,index)=>{
    html += `
      <div class="card">
        <h3>${w.method}</h3>
        <p><b>Amount:</b> ₹${w.amount}</p>
        <p><b>Charge:</b> ₹${w.charge}</p>
        <p><b>Final:</b> ₹${w.final}</p>
        <p><b>Details:</b> ${w.details || "N/A"}</p>
        <span class="badge ${getStatusClass(w.status)}">${w.status}</span>

        <button class="approve" onclick="approveWithdraw(${index})">Approve Payment</button>
        <button class="reject" onclick="rejectWithdraw(${index})">Reject</button>
      </div>
    `;
  });

  withdrawList.innerHTML = html;
}

function approveWithdraw(index){
  withdraws[index].status = "Paid";
  saveData();
  alert("Payment Approved");
  location.reload();
}

function rejectWithdraw(index){
  withdraws[index].status = "Rejected";
  saveData();
  alert("Withdraw Rejected");
  location.reload();
}

function adminLogout(){
  localStorage.removeItem("adminLoggedIn");
  window.location.href = "login.html";
}

loadTasks();
loadFolders();
loadWithdraws();
</script>

</body>
</html>
