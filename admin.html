<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout-btn{
background:#dc2626;
color:white;
border:none;
padding:12px 20px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.admin-menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px 0;
}

.admin-menu button{
padding:18px;
border:none;
border-radius:18px;
background:#7c3aed;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 10px #ddd;
}

.admin-section{
display:none;
}

.admin-section.active{
display:block;
}

.box{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 10px #ddd;
}

input,
textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

textarea{
height:170px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#7c3aed;
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.card{
background:#f9fafb;
padding:16px;
border-radius:18px;
margin-top:14px;
border-left:6px solid #7c3aed;
}

.user-card{
background:#eff6ff;
border-left:6px solid #2563eb;
}

.approve{
background:#16a34a;
}

.reject{
background:#dc2626;
}

.delete{
background:#ef4444;
}

.badge{
display:inline-block;
padding:8px 14px;
border-radius:20px;
font-weight:bold;
margin-top:10px;
}

.Pending{
background:#fef3c7;
color:#92400e;
}

.Approved{
background:#dcfce7;
color:#166534;
}

.Rejected{
background:#fee2e2;
color:#991b1b;
}

.Paid{
background:#dcfce7;
color:#166534;
}

.stat-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:15px;
}

.stat{
background:#eef2ff;
padding:15px;
border-radius:15px;
text-align:center;
font-weight:bold;
}

.screenshot{
width:100%;
border-radius:15px;
margin-top:12px;
border:1px solid #ddd;
}

.comment-box{
background:#111827;
color:white;
padding:12px;
border-radius:12px;
margin-top:10px;
word-break:break-word;
}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="top">

<h1>
Admin Panel
</h1>

<button class="logout-btn"
onclick="adminLogout()">

Logout

</button>

</div>

<!-- MENU -->

<div class="admin-menu">

<button onclick="showSection('usersSection')">
👥 All Users
</button>

<button onclick="showSection('taskSection')">
➕ Add Task
</button>

<button onclick="showSection('screenshotSection')">
🖼 Screenshot Requests
</button>

<button onclick="showSection('withdrawSection')">
💸 Withdraw Requests
</button>

</div>

<!-- USERS -->

<div id="usersSection"
class="admin-section active">

<div class="box">

<h2>
All Users
</h2>
<button onclick="downloadAllScreenshotsPDF()">
📄 Download All Screenshots PDF
</button>

<div id="userList"></div>

</div>

</div>

<!-- TASK -->

<div id="taskSection"
class="admin-section">

<div class="box">

<h2>
Add New Task
</h2>

<input id="app"
placeholder="App Name">

<input id="title"
placeholder="Task Title">

<input id="reward"
type="number"
placeholder="Reward Amount">

<input id="link"
placeholder="Play Store / Task Link">

<textarea id="comments"
placeholder="Bulk comments paste karo&#10;1 line = 1 comment"></textarea>

<button onclick="addTask()">
Add Task
</button>

</div>

<div class="box">

<h2>
All Tasks + Comment Usage
</h2>

<div id="taskList"></div>

</div>

</div>

<!-- SCREENSHOT -->

<div id="screenshotSection"
class="admin-section">

<div class="box">

<h2>
App-wise Screenshot Folders
</h2>

<div id="folderList"></div>

</div>

</div>

<!-- WITHDRAW -->

<div id="withdrawSection"
class="admin-section">

<div class="box">

<h2>
Withdraw Requests
</h2>

<div id="withdrawList"></div>

</div>

</div>

<script>

if(localStorage.getItem(
"adminLoggedIn"
) !== "yes"){

window.location.replace(
"login.html"
);

}

let users =
JSON.parse(
localStorage.getItem("users")
) || [];

let tasks =
JSON.parse(
localStorage.getItem("tasks")
) || [];

let submissions =
JSON.parse(
localStorage.getItem("submissions")
) || [];

let withdraws =
JSON.parse(
localStorage.getItem("withdraws")
) || [];

let balance =
Number(
localStorage.getItem("balance")
) || 0;

function saveData(){

localStorage.setItem(
"users",
JSON.stringify(users)
);

localStorage.setItem(
"tasks",
JSON.stringify(tasks)
);

localStorage.setItem(
"submissions",
JSON.stringify(submissions)
);

localStorage.setItem(
"withdraws",
JSON.stringify(withdraws)
);

localStorage.setItem(
"balance",
balance
);

}

/* SECTION */

function showSection(id){

document.querySelectorAll(
".admin-section"
).forEach(sec=>{

sec.classList.remove("active");

});

document.getElementById(id)
.classList.add("active");

}

/* USERS */

function loadUsers(){

let html = "";

if(users.length === 0){

html =
"<p>No users signed up yet</p>";

}

users.forEach((u,i)=>{

html += `

<div class="card user-card">

<h3>
${i+1}. ${u.name || "User"}
</h3>

<p>
<b>Mobile:</b>
${u.phone || "N/A"}
</p>

<p>
<b>Email:</b>
${u.email || "N/A"}
</p>

<p>
<b>Referral:</b>
${u.referCode || "N/A"}
</p>

<p>
<b>Joined:</b>
${u.joined || "N/A"}
</p>

</div>

`;

});

userList.innerHTML = html;

}

/* ADD TASK */

function addTask(){

let task = {

id:
Date.now().toString(),

app:
app.value.trim(),

title:
title.value.trim(),

reward:
Number(reward.value),

link:
link.value.trim(),

comments:
comments.value
.split("\n")
.map(x=>x.trim())
.filter(x=>x !== "")

};

if(
!task.app
||
!task.title
||
!task.reward
||
!task.link
){

alert(
"All fields required"
);

return;

}

tasks.push(task);

saveData();

alert("Task added");

location.reload();

}

/* TASKS */

function usedCommentCount(appName){

return submissions.filter(
s => s.app === appName
).length;

}

function loadTasks(){

let html = "";

if(tasks.length === 0){

html =
"<p>No task available</p>";

}

tasks.forEach((t,i)=>{

let total =
t.comments
?
t.comments.length
:
0;

let used =
usedCommentCount(t.app);

let left =
Math.max(total - used,0);

html += `

<div class="card">

<h3>
${t.app}
</h3>

<p>
${t.title}
</p>

<p>
<b>Reward:</b>
₹${t.reward}
</p>

<div class="stat-grid">

<div class="stat">
Total<br>${total}
</div>

<div class="stat">
Used<br>${used}
</div>

<div class="stat">
Left<br>${left}
</div>

</div>

<button class="delete"
onclick="deleteTask(${i})">

Delete Task

</button>

</div>

`;

});

taskList.innerHTML = html;

}

function deleteTask(i){

if(confirm("Delete this task?")){

tasks.splice(i,1);

saveData();

location.reload();

}

}

/* SCREENSHOTS */

function statusClass(status){

return status || "Pending";

}

function loadFolders(){

let apps = [
...new Set(
submissions.map(s => s.app)
)
];

let html = "";

if(apps.length === 0){

html =
"<p>No screenshots submitted yet</p>";

}

apps.forEach(appName=>{

let appSubs =
submissions.filter(
s => s.app === appName
);

let pending =
appSubs.filter(
s => s.status === "Pending"
).length;

let approved =
appSubs.filter(
s => s.status === "Approved"
).length;

let rejected =
appSubs.filter(
s => s.status === "Rejected"
).length;

html += `

<div class="card">

<h2>
📁 ${appName}
</h2>

<div class="stat-grid">

<div class="stat">
Pending<br>${pending}
</div>

<div class="stat">
Approved<br>${approved}
</div>

<div class="stat">
Rejected<br>${rejected}
</div>

</div>

`;

appSubs.forEach(sub=>{

let realIndex =
submissions.indexOf(sub);

html += `

<div class="card">

<h3>
${sub.title || "Task"}
</h3>

<span class="badge ${statusClass(sub.status)}">
${sub.status || "Pending"}
</span>

<p>
<b>Reward:</b>
₹${sub.reward || 0}
</p>

<p>
<b>Time:</b>
${sub.time || "N/A"}
</p>

<p>
<b>Used Comment:</b>
</p>

<div class="comment-box">
${sub.comment || ""}
</div>

${
sub.proof
?
`<img class="screenshot" src="${sub.proof}">`
:
`<p>No screenshot</p>`
}

<button class="approve"
onclick="approveTask(${realIndex})">

Approve

</button>

<button class="reject"
onclick="rejectTask(${realIndex})">

Reject

</button>

</div>

`;

});

html += `</div>`;

});

folderList.innerHTML = html;

}

function approveTask(index){

if(submissions[index].status === "Approved"){

alert("Already approved");

return;

}

submissions[index].status =
"Approved";

balance += Number(
submissions[index].reward || 0
);

saveData();

alert(
"Task approved & wallet added"
);

location.reload();

}

function rejectTask(index){

submissions[index].status =
"Rejected";

saveData();

alert("Task rejected");

location.reload();

}

/* WITHDRAW */

function loadWithdraws(){

let html = "";

if(withdraws.length === 0){

html =
"<p>No withdraw request</p>";

}

withdraws.forEach((w,i)=>{

html += `

<div class="card">

<h3>
${w.method || "Withdraw"}
</h3>

<p>
<b>Amount:</b>
₹${w.amount || 0}
</p>

<p>
<b>Charge:</b>
₹${w.charge || 0}
</p>

<p>
<b>Final:</b>
₹${w.final || 0}
</p>

<p>
<b>Details:</b>
${w.details || "N/A"}
</p>

<p>
<b>Time:</b>
${w.time || "N/A"}
</p>

<span class="badge ${statusClass(w.status)}">
${w.status || "Pending"}
</span>

<button class="approve"
onclick="approveWithdraw(${i})">

Approve Payment

</button>

<button class="reject"
onclick="rejectWithdraw(${i})">

Reject

</button>

</div>

`;

});

withdrawList.innerHTML = html;

}

function approveWithdraw(i){

withdraws[i].status =
"Paid";

saveData();

alert("Payment approved");

location.reload();

}

function rejectWithdraw(i){

withdraws[i].status =
"Rejected";

saveData();

alert("Withdraw rejected");

location.reload();

}

/* LOGOUT */

function adminLogout(){

localStorage.removeItem(
"adminLoggedIn"
);

window.location.replace(
"login.html"
);

}

/* START */

loadUsers();

loadTasks();

loadFolders();

loadWithdraws();
async function downloadAllScreenshotsPDF(){

const { jsPDF } = window.jspdf;

let doc = new jsPDF();

let y = 20;

doc.setFontSize(20);
doc.text("All Screenshot Report", 20, y);
y += 15;

for(let i = 0; i < submissions.length; i++){

let sub = submissions[i];

doc.setFontSize(14);
doc.text("App: " + (sub.app || ""), 20, y);
y += 8;

doc.text("User: " + (sub.userName || "User"), 20, y);
y += 8;

doc.text("Reward: ₹" + (sub.reward || 0), 20, y);
y += 8;

doc.text("Status: " + (sub.status || "Pending"), 20, y);
y += 8;

doc.text("Time: " + (sub.time || ""), 20, y);
y += 8;

doc.text("Comment:", 20, y);
y += 7;

doc.setFontSize(11);
doc.text((sub.comment || ""), 20, y, {maxWidth:170});
y += 20;

if(sub.proof){

try{

let img = new Image();
img.crossOrigin = "Anonymous";
img.src = sub.proof;

await new Promise((resolve,reject)=>{
img.onload = resolve;
img.onerror = reject;
});

let canvas = document.createElement("canvas");
canvas.width = img.width;
canvas.height = img.height;

let ctx = canvas.getContext("2d");
ctx.drawImage(img,0,0);

let imgData = canvas.toDataURL("image/jpeg",0.7);

doc.addImage(imgData,"JPEG",20,y,80,120);
y += 130;

}catch(e){

doc.text("Screenshot image could not load",20,y);
y += 10;

}

}

doc.line(20,y,190,y);
y += 15;

if(y > 250 && i < submissions.length - 1){
doc.addPage();
y = 20;
}

}

doc.save("all-screenshot-report.pdf");

}

</script>

</body>
</html>
