<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.top h1{
margin:0;
font-size:32px;
}

.logout-btn{
background:red;
color:white;
border:none;
padding:12px 20px;
border-radius:12px;
font-size:16px;
}

.box{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 10px #ddd;
}

input,
textarea,
select{
width:100%;
padding:15px;
margin-top:12px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

textarea{
height:180px;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#7c3aed;
color:white;
cursor:pointer;
}

.card{
background:#f9fafb;
padding:18px;
border-radius:18px;
margin-top:15px;
border-left:6px solid #7c3aed;
}

.reward{
background:#10b981;
color:white;
padding:8px 15px;
border-radius:15px;
display:inline-block;
margin-top:10px;
}

.approve{
background:#16a34a;
margin-top:10px;
}

.reject{
background:#dc2626;
margin-top:10px;
}

.delete{
background:#ef4444;
margin-top:10px;
}

img{
width:100%;
border-radius:15px;
margin-top:10px;
}

small{
color:#666;
}

</style>

</head>

<body>

<div class="top">

<h1>
Admin Panel
</h1>

<button class="logout-btn"
onclick="adminLogout()">

Logout

</button>

</div>

<!-- ADD TASK -->

<div class="box">

<h2>Add New Task</h2>

<input type="text"
id="app"
placeholder="App Name">

<input type="text"
id="title"
placeholder="Task Title">

<input type="number"
id="reward"
placeholder="Reward Amount">

<input type="text"
id="link"
placeholder="Playstore/App Link">

<textarea
id="comments"
placeholder="Bulk comments paste karo
(1 line = 1 comment)">
</textarea>

<button onclick="addTask()">

Add Task

</button>

</div>

<!-- ALL TASKS -->

<div class="box">

<h2>All Tasks</h2>

<div id="taskList"></div>

</div>

<!-- TASK SUBMISSIONS -->

<div class="box">

<h2>Task Submissions</h2>

<div id="submissionList"></div>

</div>

<!-- WITHDRAW REQUESTS -->

<div class="box">

<h2>Withdraw Requests</h2>

<div id="withdrawList"></div>

</div>

<script>

/* ADMIN SECURITY */

if(localStorage.getItem("adminLoggedIn") !== "yes"){

window.location.href = "login.html";

}

/* STORAGE */

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

let submissions =
JSON.parse(localStorage.getItem("submissions")) || [];

let withdraws =
JSON.parse(localStorage.getItem("withdraws")) || [];

/* SAVE */

function saveData(){

localStorage.setItem(
"tasks",
JSON.stringify(tasks)
);

localStorage.setItem(
"submissions",
JSON.stringify(submissions)
);

localStorage.setItem(
"withdraws",
JSON.stringify(withdraws)
);

}

/* ADD TASK */

function addTask(){

let task = {

app:
document.getElementById("app").value,

title:
document.getElementById("title").value,

reward:
document.getElementById("reward").value,

link:
document.getElementById("link").value,

comments:
document.getElementById("comments")
.value
.split("\n")
.filter(x => x.trim() !== "")

};

if(
task.app === "" ||
task.title === "" ||
task.reward === "" ||
task.link === ""
){

alert("All fields required");

return;

}

tasks.push(task);

saveData();

alert("Task Added Successfully");

location.reload();

}

/* LOAD TASKS */

function loadTasks(){

let html = "";

if(tasks.length === 0){

html = "<p>No task available</p>";

}

tasks.forEach((task,index)=>{

html += `

<div class="card">

<h3>${task.app}</h3>

<p>${task.title}</p>

<div class="reward">
₹${task.reward}
</div>

<br><br>

<small>
${task.link}
</small>

<p>
Comments:
${task.comments.length}
</p>

<button class="delete"
onclick="deleteTask(${index})">

Delete Task

</button>

</div>

`;

});

document.getElementById("taskList")
.innerHTML = html;

}

/* DELETE TASK */

function deleteTask(index){

tasks.splice(index,1);

saveData();

location.reload();

}

/* LOAD SUBMISSIONS */

function loadSubmissions(){

let html = "";

if(submissions.length === 0){

html = "<p>No submissions yet</p>";

}

submissions.forEach((sub,index)=>{

html += `

<div class="card">

<h3>${sub.app}</h3>

<p>${sub.title}</p>

<div class="reward">
₹${sub.reward}
</div>

<p>
<b>Status:</b>
${sub.status}
</p>

<p>
<b>Assigned Comment:</b>
</p>

<div style="
background:#111827;
color:white;
padding:15px;
border-radius:12px;
">

${sub.comment}

</div>

<img src="${sub.proof}">

<button class="approve"
onclick="approveTask(${index})">

Approve

</button>

<button class="reject"
onclick="rejectTask(${index})">

Reject

</button>

</div>

`;

});

document.getElementById("submissionList")
.innerHTML = html;

}

/* APPROVE */

function approveTask(index){

submissions[index].status =
"Approved";

saveData();

alert("Task Approved");

location.reload();

}

/* REJECT */

function rejectTask(index){

submissions[index].status =
"Rejected";

saveData();

alert("Task Rejected");

location.reload();

}

/* LOAD WITHDRAW */

function loadWithdraws(){

let html = "";

if(withdraws.length === 0){

html = "<p>No withdraw request</p>";

}

withdraws.forEach((w,index)=>{

html += `

<div class="card">

<h3>${w.method}</h3>

<p>
Amount: ₹${w.amount}
</p>

<p>
Charge: ₹${w.charge}
</p>

<p>
Final Amount: ₹${w.final}
</p>

<p>
${w.details}
</p>

<p>
<b>Status:</b>
${w.status}
</p>

<button class="approve"
onclick="approveWithdraw(${index})">

Approve Payment

</button>

<button class="reject"
onclick="rejectWithdraw(${index})">

Reject

</button>

</div>

`;

});

document.getElementById("withdrawList")
.innerHTML = html;

}

/* APPROVE WITHDRAW */

function approveWithdraw(index){

withdraws[index].status =
"Paid";

saveData();

alert("Payment Approved");

location.reload();

}

/* REJECT WITHDRAW */

function rejectWithdraw(index){

withdraws[index].status =
"Rejected";

saveData();

alert("Withdraw Rejected");

location.reload();

}

/* LOGOUT */

function adminLogout(){

localStorage.removeItem(
"adminLoggedIn"
);

window.location.href =
"login.html";

}

/* LOAD */

loadTasks();

loadSubmissions();

loadWithdraws();

</script>

</body>

</html>
