<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Wallet Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

  <h2>Your Balance</h2>

  <h1 id="balance">₹0.00</h1>

</div>

<div class="addmoney">

  <input type="number"
  id="amount"
  placeholder="Enter Amount">

  <button onclick="addBalance()">
    Add Balance
  </button>

</div>

<div class="actions">

  <button>Withdraw Fund</button>

  <button>Redeem Gift Card</button>

  <button>Pay To Wallet</button>

  <button>Mobile Recharge</button>

</div>

<script>

let balance = localStorage.getItem("balance");

if(balance == null){
  balance = 0;
}

document.getElementById("balance")
.innerText = "₹" + balance;

function addBalance(){

  let amount =
  document.getElementById("amount").value;

  amount = Number(amount);

  balance = Number(balance) + amount;

  localStorage.setItem("balance", balance);

  document.getElementById("balance")
  .innerText = "₹" + balance;

  alert("Balance Added");

}

</script>

</body>
</html>
